log4j.rootLogger=WARN, stdout

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=[%d] %p [%t] [%c] %m %n

log4j.logger.org.apache.kafka.streams=WARN, stdout
log4j.additivity.org.apache.kafka.streams=false

# Squelch expected error messages like: java.lang.IllegalStateException: This consumer has already been closed.
log4j.logger.org.apache.kafka.streams.processor.internals.StreamThread=WARN, stdout
log4j.additivity.org.apache.kafka.streams.processor.internals.StreamThread=false

log4j.logger.org.softwareforce.iotvm=INFO, stdout
log4j.additivity.org.softwareforce.iotvm=false
