version: '3.8'
services:

#  mozart-prototype1-mongodb:
#    image: mongo:4.4.8
#    container_name: 'mozart_prototype1_mongodb'
#    ports:
#      - 27017:27017
#    volumes:
#      # - ~/volumes/mozart/.../mongodb/:/data/db/
#      - F:\DevEnv\DockerPersistence\Mozart\Prototype1\mongodb:/data/db

  mozart-prototype1-kafka:
    container_name: 'mozart_prototype1_kafka'
    image: confluentinc/cp-kafka:5.5.5
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: mozart-prototype1-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://mozart-prototype1-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ADVERTISED_HOST_NAME: mozart-prototype1-kafka

  mozart-prototype1-zookeeper:
    container_name: 'mozart_prototype1_zookeeper'
    image: confluentinc/cp-zookeeper:5.5.5
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
